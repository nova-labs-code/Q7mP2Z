<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>system terminal</title>

<style>
body {
  margin: 0;
  background: #05080a;
  color: #cfe3d6;
  font-family: ui-monospace, monospace;
}

#screen {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

.input-line {
  display: flex;
  padding: 10px 20px;
}

.prompt {
  color: #6ee7b7;
  margin-right: 10px;
}

input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #cfe3d6;
  font: inherit;
}
</style>
</head>

<body>

<div id="screen"></div>

<div class="input-line">
  <span class="prompt">user@node:~$</span>
  <input id="cmd" autocomplete="off" />
</div>

<script>
const screen = document.getElementById("screen");
const input = document.getElementById("cmd");

let username = null;
let session = null;
let loggedIn = false;

function print(t) {
  const div = document.createElement("div");
  div.textContent = t;
  screen.appendChild(div);
}

function send(cmd) {
  print("user@node:~$ " + cmd);

  // LOGIN
  if (cmd.startsWith("login ")) {
    const parts = cmd.split(" ");

    if (parts.length < 3) {
      print("[sys] format: login <username> <code>");
      return;
    }

    username = parts[1];
    session = parts[2];
    loggedIn = true;

    print("[sys] identity locked");
    print("[sys] user: " + username);
    return;
  }

  if (!loggedIn) {
    print("[sys] authentication required");
    return;
  }

  if (cmd.startsWith("kill ")) {
    const target = cmd.split(" ")[1];

    const payload = {
      id: Date.now().toString(),
      username: username,
      session: session,
      command: "kill",
      target: target
    };

    console.log("PASTE INTO command.json:");
    console.log(JSON.stringify(payload, null, 2));

    print("[sys] kill signal staged");
  }

  if (cmd === "clear") {
    screen.innerHTML = "";
  }
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    send(input.value.trim());
    input.value = "";
  }
});
</script>

</body>
</html>
