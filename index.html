<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Wraps</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at center, #111827, #030712);
      color: #e5e7eb;
      text-align: center;
    }

    .container {
      padding: 24px;
    }

    h1 {
      font-size: 2.4rem;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    p {
      font-size: 1rem;
      opacity: 0.75;
    }

    .seal {
      margin-top: 18px;
      display: inline-block;
      padding: 8px 14px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      font-size: 0.85rem;
      letter-spacing: 1px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TOP SECRET</h1>
    <p>This project is currently under wraps.</p>
    <div class="seal">Access restricted</div>
  </div>
</body>
</html>
