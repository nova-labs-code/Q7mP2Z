<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  background:#0b0f12;
  color:#cfe3d6;
  font-family: monospace;
  padding:40px;
}

button {
  display:block;
  margin:10px 0;
  padding:10px;
  background:#1a1f26;
  color:white;
  border:1px solid #333;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>Admin Control Panel</h2>

<button onclick="send('StartRound')">Start Round</button>
<button onclick="send('EndRound')">End Round</button>
<button onclick="send('KillAll')">Kill All</button>
<button onclick="send('LightsOut')">Lights Out</button>

<script>
function send(cmd) {
  const payload = {
    id: Date.now().toString(),
    command: cmd
  };

  console.log("COPY INTO run.json:");
  console.log(JSON.stringify(payload, null, 2));

  alert("Command generated: " + cmd);
}
</script>

</body>
</html>
